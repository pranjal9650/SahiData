version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd excel_validation_frontend
        - npm ci --silent
    build:
      commands:
        - cd excel_validation_frontend && CI=false npm run build
  artifacts:
    baseDirectory: excel_validation_frontend/build
    files:
      - '**/*'
  cache:
    paths:
      - excel_validation_frontend/node_modules/**/*
