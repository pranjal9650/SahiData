name: Sync Alarm & Site Data to EC2

on:
  schedule:
    - cron: '0 * * * *'   # every hour automatically
  workflow_dispatch:        # also allows manual trigger from GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pymysql sshtunnel

      - name: Run sync script
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: python scripts/sync_to_ec2.py
